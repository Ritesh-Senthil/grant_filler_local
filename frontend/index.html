<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Keep localStorage key in sync with THEME_STORAGE_KEY in src/theme.ts (avoids light flash before JS). -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem("grantfiller.theme");
          if (v === "dark") document.documentElement.classList.add("dark");
          else if (v === "light") document.documentElement.classList.remove("dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrantFiller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
